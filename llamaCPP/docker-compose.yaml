version: "3.9"

services:
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    container_name: llama-cpp-container
    restart: always
    ports:
      - "9722:8080"
    volumes:
      - models:/path/to/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # command: -m /path/to/models/Qwen3.6-35B-A3B-Q4_K_M.gguf --host 0.0.0.0 --port 8080 --n-gpu-layers 999 --n-predict -1 --ctx-size 16384 --context-shift --no-mmap --batch-size 512 --no-prompt-patience --no-checkpoints --threads 16
    command: -m /path/to/models/Qwen3.6-35B-A3B-Q4_K_M.gguf --host 0.0.0.0 --port 8080 --n-gpu-layers 999 --n-predict -1 --ctx-size 16384 --context-shift --no-mmap --batch-size 512 --threads 8
    networks:
      - llama-cpp-network

volumes:
  models:
    driver: local
    driver_opts:
      type: none
      device: ${MODELS_PATH}
      o: bind
  pgadmin-data:

networks:
  llama-cpp-network:
    driver: bridge