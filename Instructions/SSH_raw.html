			data: {"sidebar_enabled":true,"sidebar_active":false,"sidebar_only_search":true,"preload":{"os":"APM","content":"<h1 class=\"kb_accordion_h1\"><a id=\"x_anchor_id63345cc93b\"><\/a>\u041a\u0430\u043a \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u044c \u0438 \u0432\u043a\u043b\u044e\u0447\u0438\u0442\u044c OpenSSH?<span><\/span><\/h1>\n<div class=\"kb_accordion_container\">\n<div class=\"kb_accordion has_accordion\">\n<h2 class=\"kb_accordion_title\"><a id=\"x_anchor_id261addf78c\"><\/a>\u0426\u0435\u043b\u044c<\/h2>\n<div class=\"kb_accordion_content\">\n<div>\n<p>OpenSSH \u2014 \u044d\u0442\u043e \u0438\u043d\u0441\u0442\u0440\u0443\u043c\u0435\u043d\u0442 \u0434\u043b\u044f \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0433\u043e \u0443\u0434\u0430\u043b\u0435\u043d\u043d\u043e\u0433\u043e \u0432\u0445\u043e\u0434\u0430 \u0441 \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u043d\u0438\u0435\u043c \u043f\u0440\u043e\u0442\u043e\u043a\u043e\u043b\u0430 SSH. \u041e\u043d \u0448\u0438\u0444\u0440\u0443\u0435\u0442 \u0432\u0435\u0441\u044c \u0442\u0440\u0430\u0444\u0438\u043a \u043c\u0435\u0436\u0434\u0443 \u043a\u043b\u0438\u0435\u043d\u0442\u043e\u043c \u0438 \u0441\u0435\u0440\u0432\u0435\u0440\u043e\u043c, \u043f\u0440\u0435\u0434\u043e\u0442\u0432\u0440\u0430\u0449\u0430\u044f \u0443\u0442\u0435\u0447\u043a\u0438 \u0434\u0430\u043d\u043d\u044b\u0445 \u0438 \u0437\u043b\u043e\u043d\u0430\u043c\u0435\u0440\u0435\u043d\u043d\u044b\u0435 \u0430\u0442\u0430\u043a\u0438.<\/p>\n<p>ActiveProtect \u0442\u0440\u0435\u0431\u0443\u0435\u0442 OpenSSH \u0434\u043b\u044f \u0440\u0435\u0437\u0435\u0440\u0432\u043d\u043e\u0433\u043e \u043a\u043e\u043f\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f \u0431\u0430\u0437 \u0434\u0430\u043d\u043d\u044b\u0445 SQL\/Oracle \u0438 \u0432\u044b\u043f\u043e\u043b\u043d\u0435\u043d\u0438\u044f \u0441\u0446\u0435\u043d\u0430\u0440\u0438\u0435\u0432. \u042d\u0442\u0430 \u0441\u0442\u0430\u0442\u044c\u044f \u043f\u043e\u043c\u043e\u0436\u0435\u0442 \u0432\u0430\u043c \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u044c \u0438 \u0432\u043a\u043b\u044e\u0447\u0438\u0442\u044c OpenSSH.<\/p>\n<\/div>\n<\/div>\n<\/div>\n<div class=\"kb_accordion has_accordion\">\n<h2 class=\"kb_accordion_title\"><a id=\"x_anchor_idb5a4b64b2a\"><\/a>\u0420\u0435\u0448\u0435\u043d\u0438\u0435<\/h2>\n<div class=\"kb_accordion_content\">\n<div>\n<h3 class=\"margin_bottom_1\"><a id=\"x_anchor_idaea23489ce\"><\/a>Windows<\/h3>\n<p class=\"margin_bottom_1\"><strong>\u041f\u0435\u0440\u0435\u0434 \u043d\u0430\u0447\u0430\u043b\u043e\u043c \u0440\u0430\u0431\u043e\u0442\u044b<\/strong><\/p>\n<ol class=\"type_lower-decimal\">\n<li>\u0417\u0430\u043f\u0443\u0441\u0442\u0438\u0442\u0435 <strong>Windows PowerShell<\/strong> \u043e\u0442 \u0438\u043c\u0435\u043d\u0438 \u0430\u0434\u043c\u0438\u043d\u0438\u0441\u0442\u0440\u0430\u0442\u043e\u0440\u0430.<\/li>\n<li>\u0412\u044b\u043f\u043e\u043b\u043d\u0438\u0442\u0435 \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0443\u044e \u043a\u043e\u043c\u0430\u043d\u0434\u0443, \u0447\u0442\u043e\u0431\u044b \u043f\u0440\u043e\u0432\u0435\u0440\u0438\u0442\u044c, \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d \u043b\u0438 \u0441\u0435\u0440\u0432\u0435\u0440 OpenSSH:<br \/>\n<div class=\"code_div\"><code>get-service sshd<\/code><\/div>\n<\/li>\n<li>\u041d\u0430 \u043e\u0441\u043d\u043e\u0432\u0430\u043d\u0438\u0438 \u0432\u044b\u0432\u043e\u0434\u0430:<ul>\n<li>\u0415\u0441\u043b\u0438 sshd \u043d\u0435 \u0443\u043a\u0430\u0437\u0430\u043d, \u043f\u0435\u0440\u0435\u0439\u0434\u0438\u0442\u0435 \u043a <a href=\"#WIn8iCJB1a\">\u0448\u0430\u0433\u0430\u043c \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438<\/a>.<\/li>\n<li>\u0415\u0441\u043b\u0438 sshd \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d, \u043d\u043e \u043d\u0435 \u0437\u0430\u043f\u0443\u0449\u0435\u043d, \u0441\u043b\u0435\u0434\u0443\u0439\u0442\u0435 <a href=\"#hoTPsicOiB\">\u0448\u0430\u0433\u0430\u043c \u0432\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u044f<\/a>.<\/li>\n<\/ul>\n<\/li>\n<\/ol>\n<p class=\"margin_bottom_1\"><strong><a id=\"WIn8iCJB1a\"><\/a>\u0423\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430 \u0441\u0435\u0440\u0432\u0435\u0440\u0430 OpenSSH<\/strong><\/p>\n<p>\u0421\u043e\u0432\u0440\u0435\u043c\u0435\u043d\u043d\u044b\u0435 \u0432\u0435\u0440\u0441\u0438\u0438 Windows \u0432\u043a\u043b\u044e\u0447\u0430\u044e\u0442 OpenSSH \u043a\u0430\u043a \u0434\u043e\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u043d\u0443\u044e \u0444\u0443\u043d\u043a\u0446\u0438\u044e. \u0421\u043b\u0435\u0434\u0443\u0439\u0442\u0435 \u044d\u0442\u0438\u043c \u0448\u0430\u0433\u0430\u043c \u0434\u043b\u044f \u0435\u0433\u043e \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438:<\/p>\n<ol class=\"type_lower-decimal\">\n<li>\u041f\u0440\u043e\u0432\u0435\u0440\u044c\u0442\u0435, \u0434\u043e\u0441\u0442\u0443\u043f\u0435\u043d \u043b\u0438 OpenSSH \u043d\u0430 \u0432\u0430\u0448\u0435\u0439 \u0441\u0438\u0441\u0442\u0435\u043c\u0435, \u0432\u044b\u043f\u043e\u043b\u043d\u0438\u0432:<br \/>\n<div class=\"code_div\"><code>Get-WindowsCapability -Online | Where-Object Name -like 'OpenSSH*'<\/code><\/div>\n<\/li>\n<li>\u041d\u0430 \u043e\u0441\u043d\u043e\u0432\u0430\u043d\u0438\u0438 \u0432\u044b\u0432\u043e\u0434\u0430:<\/li>\n<ul>\n<li>\u0415\u0441\u043b\u0438 OpenSSH \u0443\u043a\u0430\u0437\u0430\u043d, \u0437\u0430\u043f\u043e\u043c\u043d\u0438\u0442\u0435 \u0442\u043e\u0447\u043d\u043e\u0435 \u0438\u043c\u044f \u0441\u043b\u0443\u0436\u0431\u044b \u0438 \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u0435 \u0435\u0433\u043e, \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u044f:<br \/>\n<div class=\"code_div\"><code>Add-WindowsCapability -Online -Name Exact Service Name<\/code><\/div>\n<\/li>\n<li>\u0415\u0441\u043b\u0438 \u0441\u043b\u0443\u0436\u0431\u044b OpenSSH \u043d\u0435 \u043e\u0442\u043e\u0431\u0440\u0430\u0436\u0430\u044e\u0442\u0441\u044f, \u0432\u0430\u0448\u0430 \u0432\u0435\u0440\u0441\u0438\u044f Windows \u043d\u0435 \u0432\u043a\u043b\u044e\u0447\u0430\u0435\u0442 OpenSSH. \u0417\u0430\u0433\u0440\u0443\u0437\u0438\u0442\u0435 \u0444\u0430\u0439\u043b MSI \u0438\u0437 <a href=\"https:\/\/github.com\/PowerShell\/Win32-OpenSSH\/releases\" rel=\"noopener noreferrer nofollow\" target=\"_blank\">\u0440\u0435\u043f\u043e\u0437\u0438\u0442\u043e\u0440\u0438\u044f Windows \u043d\u0430 Github<\/a> \u0438 \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u0435 \u0435\u0433\u043e, \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u044f:<br \/>\n<div class=\"code_div\"><code>msiexec \/i MSI File Path<\/code><\/div>\n<\/li>\n<li>\u0415\u0441\u043b\u0438 \u043f\u043e\u044f\u0432\u043b\u044f\u0435\u0442\u0441\u044f \u0441\u043e\u043e\u0431\u0449\u0435\u043d\u0438\u0435 \u043e\u0431 \u043e\u0448\u0438\u0431\u043a\u0435, \u0432\u043e\u0437\u043c\u043e\u0436\u043d\u043e, \u0432\u0430\u0448\u0430 \u0432\u0438\u0440\u0442\u0443\u0430\u043b\u044c\u043d\u0430\u044f \u043c\u0430\u0448\u0438\u043d\u0430 \u043d\u0435 \u043f\u043e\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u0430 \u043a \u0418\u043d\u0442\u0435\u0440\u043d\u0435\u0442\u0443. \u041e\u0431\u0440\u0430\u0442\u0438\u0442\u0435\u0441\u044c \u043a <a href=\"https:\/\/learn.microsoft.com\/windows-server\/administration\/OpenSSH\/openssh-overview\" rel=\"noopener noreferrer nofollow\" target=\"_blank\">\u0434\u043e\u043a\u0443\u043c\u0435\u043d\u0442\u0430\u0446\u0438\u0438 Windows<\/a>, \u0447\u0442\u043e\u0431\u044b \u043e\u043f\u0440\u0435\u0434\u0435\u043b\u0438\u0442\u044c, \u043c\u043e\u0436\u0435\u0442\u0435 \u043b\u0438 \u0432\u044b \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u044c \u0435\u0433\u043e \u043d\u0430\u043f\u0440\u044f\u043c\u0443\u044e \u0438\u043b\u0438 \u043d\u0443\u0436\u043d\u043e \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u044c GitHub.<\/li>\n<\/ul>\n<\/ol>\n<p class=\"margin_bottom_1\"><strong><a id=\"hoTPsicOiB\"><\/a>\u0412\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u0435 OpenSSH<\/strong><\/p>\n<ol class=\"type_lower-decimal\">\n<li>\u041f\u043e\u0441\u043b\u0435 \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0438 \u043d\u0430\u0441\u0442\u0440\u043e\u0439\u0442\u0435 OpenSSH \u043d\u0430 \u0430\u0432\u0442\u043e\u043c\u0430\u0442\u0438\u0447\u0435\u0441\u043a\u0438\u0439 \u0437\u0430\u043f\u0443\u0441\u043a:\n              <div class=\"code_div\"><code>Get-Service sshd | Set-Service -StartupType Automatic -PassThru<br \/>Start-Service sshd<\/code><\/div><\/li>\n<li>\u0427\u0442\u043e\u0431\u044b \u043f\u0440\u043e\u0432\u0435\u0440\u0438\u0442\u044c, \u0440\u0430\u0431\u043e\u0442\u0430\u0435\u0442 \u043b\u0438 OpenSSH, \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0439\u0442\u0435:<br \/>\n<div class=\"code_div\"><code>get-service sshd<\/code><\/div>\n<\/li>\n<\/ol>\n<h3><a id=\"x_anchor_idedc9f0a5a5\"><\/a>Linux<\/h3>\n<p>\u0421\u0435\u0440\u0432\u0435\u0440 OpenSSH \u0432\u0441\u0442\u0440\u043e\u0435\u043d \u0432 \u0431\u043e\u043b\u044c\u0448\u0438\u043d\u0441\u0442\u0432\u043e \u0434\u0438\u0441\u0442\u0440\u0438\u0431\u0443\u0442\u0438\u0432\u043e\u0432 Linux \u0438 \u043c\u043e\u0436\u0435\u0442 \u0431\u044b\u0442\u044c \u043b\u0435\u0433\u043a\u043e \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d \u0441 \u043f\u043e\u043c\u043e\u0449\u044c\u044e \u043f\u0440\u043e\u0441\u0442\u043e\u0439 \u043a\u043e\u043c\u0430\u043d\u0434\u044b:<\/p>\n<ul>\n<li>Ubuntu\/Debian<br \/>\n<div class=\"code_div\"><code>sudo apt-get install openssh-server<\/code><\/div>\n<\/li>\n<li>Arch<br \/>\n<div class=\"code_div\"><code>sudo pacman -S openssh<\/code><\/div>\n<\/li>\n<li>Red Hat<br \/>\n<div class=\"code_div\"><code>yum install  openssh-server<\/code><\/div>\n<\/li>\n<\/ul>\n<h3><a id=\"x_anchor_idf770aec891\"><\/a>\u041f\u0440\u043e\u0432\u0435\u0440\u043a\u0430 \u043f\u043e\u0440\u0442\u0430 OpenSSH<\/h3>\n<p class=\"margin_bottom_1\">\u041f\u043e \u0443\u043c\u043e\u043b\u0447\u0430\u043d\u0438\u044e \u043f\u043e\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u0438\u044f SSH \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u044e\u0442 \u043f\u043e\u0440\u0442 22. \u041e\u0434\u043d\u0430\u043a\u043e, \u0435\u0441\u043b\u0438 \u0432\u044b \u0438\u0437\u043c\u0435\u043d\u0438\u043b\u0438 \u043d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0438, SSH \u043c\u043e\u0436\u0435\u0442 \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u044c \u0434\u0440\u0443\u0433\u043e\u0439 \u043f\u043e\u0440\u0442. \u0427\u0442\u043e\u0431\u044b \u043f\u0440\u043e\u0432\u0435\u0440\u0438\u0442\u044c, \u043a\u0430\u043a\u043e\u0439 \u043f\u043e\u0440\u0442 \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u0442\u0441\u044f \u0432 \u0434\u0430\u043d\u043d\u044b\u0439 \u043c\u043e\u043c\u0435\u043d\u0442, \u043f\u043e\u043f\u0440\u043e\u0431\u0443\u0439\u0442\u0435 \u043e\u0434\u0438\u043d \u0438\u0437 \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0438\u0445 \u043c\u0435\u0442\u043e\u0434\u043e\u0432:<\/p>\n<p class=\"margin_bottom_1\"><strong>\u041c\u0435\u0442\u043e\u0434 1: \u041f\u0440\u043e\u0432\u0435\u0440\u044c\u0442\u0435 \u0444\u0430\u0439\u043b\u044b \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0430\u0446\u0438\u0438<\/strong><\/p>\n<ol class=\"type_lower-decimal\">\n<li>\u041e\u0442\u043a\u0440\u043e\u0439\u0442\u0435 \u0444\u0430\u0439\u043b \u043a\u043e\u043d\u0444\u0438\u0433\u0443\u0440\u0430\u0446\u0438\u0438 SSH:<ul>\n<li>Windows: <code>%programdata%\/ssh\/sshd_config<\/code><\/li>\n<li>Linux: <code>\/etc\/ssh\/sshd_config<\/code><\/li>\n<\/ul>\n<\/li>\n<li>\u041d\u0430\u0439\u0434\u0438\u0442\u0435 \u043d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0443 <strong>\u041f\u043e\u0440\u0442<\/strong> \u0432 \u0444\u0430\u0439\u043b\u0435. \u0415\u0441\u043b\u0438 \u043f\u043e\u0440\u0442 \u043d\u0435 \u0443\u043a\u0430\u0437\u0430\u043d, \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u0442\u0441\u044f \u043f\u043e\u0440\u0442 \u043f\u043e \u0443\u043c\u043e\u043b\u0447\u0430\u043d\u0438\u044e 22. \u0415\u0441\u043b\u0438 \u0435\u0441\u0442\u044c \u043d\u0435\u0441\u043a\u043e\u043b\u044c\u043a\u043e \u043e\u043f\u0435\u0440\u0430\u0442\u043e\u0440\u043e\u0432 \u043f\u043e\u0440\u0442\u0430, \u043e\u043d\u0438 \u0443\u043a\u0430\u0437\u044b\u0432\u0430\u044e\u0442 \u043d\u0430 \u0432\u0430\u0448\u0438 \u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u0441\u043a\u0438\u0435 \u043d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0438 \u043f\u043e\u0440\u0442\u0430. \u041e\u0431\u0440\u0430\u0442\u0438\u0442\u0435 \u0432\u043d\u0438\u043c\u0430\u043d\u0438\u0435, \u0447\u0442\u043e \u043b\u044e\u0431\u0430\u044f \u0441\u0442\u0440\u043e\u043a\u0430, \u043d\u0430\u0447\u0438\u043d\u0430\u044e\u0449\u0430\u044f\u0441\u044f \u0441 #, \u043d\u0435 \u0434\u0435\u0439\u0441\u0442\u0432\u0443\u0435\u0442.<\/li>\n<\/ol>\n<p class=\"margin_bottom_1\"><strong>\u041c\u0435\u0442\u043e\u0434 2: \u0412\u044b\u043f\u043e\u043b\u043d\u0438\u0442\u0435 \u043a\u043e\u043c\u0430\u043d\u0434\u0443<\/strong><\/p>\n<ul>\n<li>Windows: \u0412\u044b\u043f\u043e\u043b\u043d\u0438\u0442\u0435 \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0443\u044e \u043a\u043e\u043c\u0430\u043d\u0434\u0443 \u0432 PowerShell. \u0415\u0441\u043b\u0438 \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d \u043d\u0430\u0441\u0442\u0440\u0430\u0438\u0432\u0430\u0435\u043c\u044b\u0439 \u043d\u043e\u043c\u0435\u0440 \u043f\u043e\u0440\u0442\u0430, \u043e\u043d \u0431\u0443\u0434\u0435\u0442 \u043e\u0442\u043e\u0431\u0440\u0430\u0436\u0435\u043d \u0432 \u0432\u044b\u0432\u043e\u0434\u0435. \u0415\u0441\u043b\u0438 \u0432\u044b\u0432\u043e\u0434\u0430 \u043d\u0435\u0442, \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u0442\u0441\u044f \u043f\u043e\u0440\u0442 \u043f\u043e \u0443\u043c\u043e\u043b\u0447\u0430\u043d\u0438\u044e 22.<div class=\"code_div\"><code>Select-String -Path \"sshd_config\" -Pattern \"^Port\" | ForEach-Object { $_.Line.Split()[1] }<\/code><\/div><\/li>\n<li>Linux: \u0412\u044b\u043f\u043e\u043b\u043d\u0438\u0442\u0435 \u0441\u043b\u0435\u0434\u0443\u044e\u0449\u0443\u044e \u043a\u043e\u043c\u0430\u043d\u0434\u0443 \u0432 \u0422\u0435\u0440\u043c\u0438\u043d\u0430\u043b\u0435. \u0415\u0441\u043b\u0438 \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d \u043d\u0430\u0441\u0442\u0440\u0430\u0438\u0432\u0430\u0435\u043c\u044b\u0439 \u043d\u043e\u043c\u0435\u0440 \u043f\u043e\u0440\u0442\u0430, \u043e\u043d \u0431\u0443\u0434\u0435\u0442 \u043e\u0442\u043e\u0431\u0440\u0430\u0436\u0435\u043d \u0432 \u0432\u044b\u0432\u043e\u0434\u0435. \u0415\u0441\u043b\u0438 \u0432\u044b\u0432\u043e\u0434\u0430 \u043d\u0435\u0442, \u0438\u0441\u043f\u043e\u043b\u044c\u0437\u0443\u0435\u0442\u0441\u044f \u043f\u043e\u0440\u0442 \u043f\u043e \u0443\u043c\u043e\u043b\u0447\u0430\u043d\u0438\u044e 22.<div class=\"code_div\"><code>grep -i '^port' \/etc\/ssh\/sshd_config | awk '{print $2}'<\/code><\/div><\/li><\/ul>\n<p class=\"margin_bottom_1\"><strong>\u041e\u0431\u043d\u043e\u0432\u0438\u0442\u0435 \u043d\u043e\u043c\u0435\u0440 \u043f\u043e\u0440\u0442\u0430 \u0432 ActiveProtect<\/strong><\/p>\n<p>\u0415\u0441\u043b\u0438 \u0434\u043b\u044f SSH \u0443\u0441\u0442\u0430\u043d\u043e\u0432\u043b\u0435\u043d \u043d\u0435\u0441\u0442\u0430\u043d\u0434\u0430\u0440\u0442\u043d\u044b\u0439 \u043f\u043e\u0440\u0442, \u0432\u044b \u0434\u043e\u043b\u0436\u043d\u044b \u0432\u0432\u0435\u0441\u0442\u0438 \u044d\u0442\u043e\u0442 \u043d\u043e\u043c\u0435\u0440 \u043f\u043e\u0440\u0442\u0430 \u0432 ActiveProtect, \u0447\u0442\u043e\u0431\u044b \u043e\u0431\u0435\u0441\u043f\u0435\u0447\u0438\u0442\u044c \u043f\u0440\u0430\u0432\u0438\u043b\u044c\u043d\u0443\u044e \u0440\u0430\u0431\u043e\u0442\u0443 \u0437\u0430\u0434\u0430\u043d\u0438\u0439 \u0440\u0435\u0437\u0435\u0440\u0432\u043d\u043e\u0433\u043e \u043a\u043e\u043f\u0438\u0440\u043e\u0432\u0430\u043d\u0438\u044f.<\/p>\n<ol class=\"type_lower-decimal\">\n<li>\u0412\u044b\u0431\u0435\u0440\u0438\u0442\u0435 \u0446\u0435\u043b\u0435\u0432\u044b\u0435 \u0432\u0438\u0440\u0442\u0443\u0430\u043b\u044c\u043d\u044b\u0435 \u043c\u0430\u0448\u0438\u043d\u044b.<\/li>\n<li>\u041d\u0430\u0436\u043c\u0438\u0442\u0435 <strong>\u0415\u0449\u0451<\/strong>, \u0437\u0430\u0442\u0435\u043c \u0432\u044b\u0431\u0435\u0440\u0438\u0442\u0435 <strong>\u0423\u043a\u0430\u0437\u0430\u0442\u044c \u0430\u0434\u0440\u0435\u0441<\/strong>.<\/li>\n<li>\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u0441\u0432\u043e\u0439 \u043f\u043e\u043b\u044c\u0437\u043e\u0432\u0430\u0442\u0435\u043b\u044c\u0441\u043a\u0438\u0439 \u043d\u043e\u043c\u0435\u0440 \u043f\u043e\u0440\u0442\u0430.<\/li>\n<\/ol>\n<\/div>\n<\/div>\n<\/div>\n<\/div><link rel=\"stylesheet\" href=\"\/css\/feedback_form\/feedback_form_web.css\" \/>\n\n<div class=\"feedBackForm feedBackForm--noiframe clearfix ru-ru\" style=\"opacity: 0;\">\n    <div class=\"clearfix\">\n        <!-- Begin page content -->\n        <div id=\"main\" class=\"APM\">\n            <div class=\"feedback_form\">\n                <form id=\"feedback_form\" class=\"feedback_form_class\" action=\"https:\/\/kb.synology.com\/ru-ru\/feedback\" method=\"POST\">\n                    <div id=\"form_option\" class=\"form_option_class\" style=\"display:none;\" >\n                        <!-- option when selected no -->\n\n                        <div class=\"button_no\">\n                            <div class=\"center\" style=\"text-align:left;margin-top:3px;\">\n                                <p class=\"button_no_title\">\u0420\u0430\u0441\u0441\u043a\u0430\u0436\u0438\u0442\u0435, \u043f\u043e\u0447\u0435\u043c\u0443 \u044d\u0442\u0430 \u0441\u0442\u0430\u0442\u044c\u044f \u043d\u0435 \u0431\u044b\u043b\u0430 \u043f\u043e\u043b\u0435\u0437\u043d\u043e\u0439:<\/p>\n\n
